title: "Suzuran's Blog"
subtitle: ""
description: 个人博客
keywords:
author: Akito0723
language: zh-CN
timezone: Asia/Shanghai

url: https://blog.suzuran.vip
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ""
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js

highlight:
  line_number: false
  auto_detect: false
  tab_replace: ""
  wrap: false
  hljs: false

prismjs:
  preprocess: true
  line_number: true
  tab_replace: ""

default_category: uncategorized
category_map:
tag_map:
metadata:

date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

per_page: 10
pagination_dir: page

include:
exclude:
ignore:

theme: typo

deploy:
  type: ""

feed:
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content: true
  content_limit: 140
  content_limit_delim: " "
  order_by: -date
